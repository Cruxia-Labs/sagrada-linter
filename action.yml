name: "Sagrada Linter"
description: "Catch zombie prompts — retracted rules re-added to your .cursorrules / CLAUDE.md / AGENTS.md — and attach a verifiable ER1 receipt."
author: "Cruxia-Labs"
branding:
  icon: "shield"
  color: "yellow"

inputs:
  paths:
    description: "Optional rule files to scan (space-separated). Default: auto-discover."
    required: false
    default: ""
  comment:
    description: "Post a PR comment with the result."
    required: false
    default: "true"
  fail-on-zombie:
    description: "Fail the check when a zombie prompt is found."
    required: false
    default: "true"
  vitals:
    description: "Also compute the 0-100 belief-integrity score (SAGRADA-VITALS-METHOD v0.1) and publish it to the job summary + a badge artifact."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install Sagrada Linter
      shell: bash
      # Install from the Action's OWN pinned code ($GITHUB_ACTION_PATH), not live PyPI —
      # the version you get is exactly the action ref you pinned (no supply-chain substitution).
      run: pip install "$GITHUB_ACTION_PATH"

    - name: Scan rule-file history for zombie prompts
      id: scan
      shell: bash
      env:
        # Passed as an ordinary shell variable (NOT substituted into the command text by GitHub),
        # so its contents are treated as literal words — no command injection.
        SAGRADA_PATHS: ${{ inputs.paths }}
      run: |
        set +e          # the scan is allowed to exit non-zero on a zombie
        set -f          # disable globbing when $SAGRADA_PATHS word-splits
        # One call: write receipts (stderr keeps stdout clean), print the PR comment to a
        # file, and exit non-zero on a zombie. The comment only ever contains DETERMINISTIC
        # retract->re-add events — amber never reaches a reviewer's PR. Flags come first and a
        # literal `--` precedes $SAGRADA_PATHS so its words can only ever be PATHS, never options
        # (no `--repo`-style argument injection even though it word-splits).
        sagrada-linter scan-history \
          --receipt --receipt-dir "$RUNNER_TEMP/sagrada-receipts" \
          --github-comment --strict \
          -- $SAGRADA_PATHS > "$RUNNER_TEMP/sagrada-comment.md"
        code=$?
        echo "exit_code=$code" >> "$GITHUB_OUTPUT"
        echo "----- sagrada comment -----"
        cat "$RUNNER_TEMP/sagrada-comment.md"

    - name: Belief-integrity score (Vitals)
      if: ${{ inputs.vitals == 'true' }}
      shell: bash
      run: |
        set -e
        # Frozen method (v0.1): deterministic, record-side, offline. The badge JSON is a
        # shields.io endpoint file; publish it wherever your badge points (artifact here).
        sagrada-linter vitals --badge-out "$RUNNER_TEMP/belief-badge.json" \
          | tee "$RUNNER_TEMP/sagrada-vitals.txt"
        {
          echo '### belief-integrity'
          echo '```'
          cat "$RUNNER_TEMP/sagrada-vitals.txt"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload belief-integrity badge
      if: ${{ inputs.vitals == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: belief-integrity-badge
        path: ${{ runner.temp }}/belief-badge.json
        if-no-files-found: ignore

    - name: Upload ER1 receipts
      uses: actions/upload-artifact@v4
      with:
        name: sagrada-er1-receipts
        path: ${{ runner.temp }}/sagrada-receipts/
        if-no-files-found: ignore

    - name: Comment on the pull request
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const body = fs.readFileSync(`${process.env.RUNNER_TEMP}/sagrada-comment.md`, 'utf8');
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });

    - name: Enforce (fail on zombie)
      if: ${{ inputs.fail-on-zombie == 'true' && steps.scan.outputs.exit_code != '0' }}
      shell: bash
      run: |
        echo "::error::Sagrada Linter: a retracted rule was re-added (zombie prompt). See the PR comment and the ER1 receipt artifact."
        exit 1
